<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Ko Japanese Dining - Admin Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
      padding: 30px;
    }

    h1 {
      margin-bottom: 10px;
    }

    h2 {
      margin-bottom: 30px;
      font-weight: normal;
      color: #ccc;
    }

    .orders-container {
      display: grid;
      gap: 20px;
    }

    .order-card {
      background: #1d1d1d;
      border: 1px solid #333;
      border-radius: 10px;
      padding: 20px;
    }

    .order-card h3 {
      margin-top: 0;
      color: #ffb3b8;
    }

    .label {
      font-weight: bold;
      color: #ddd;
    }

    .status {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 5px;
      background: #e63946;
      margin-top: 10px;
    }

    #message {
      margin-bottom: 20px;
      color: #ffb3b8;
    }

    button {
      padding: 10px 16px;
      background: #e63946;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      margin-bottom: 20px;
    }

    button:hover {
      background: #ff4d5a;
    }
  </style>
</head>
<body>
  <h1>Ko Japanese Dining</h1>
  <h2>Admin Dashboard</h2>

  <button id="loadOrdersBtn">Load Orders</button>
  <div id="message"></div>
  <div id="ordersContainer" class="orders-container"></div>

  <script>
    const loadOrdersBtn = document.getElementById("loadOrdersBtn");
    const ordersContainer = document.getElementById("ordersContainer");
    const message = document.getElementById("message");

    async function loadOrders() {
      message.textContent = "";
      ordersContainer.innerHTML = "";

      const token = localStorage.getItem("token");

      try {
        const res = await fetch("/api/admin/orders", {
          method: "GET",
          headers: {
            "Content-Type": "application/json",
            ...(token ? { Authorization: `Bearer ${token}` } : {})
          }
        });

        const data = await res.json();

        if (!res.ok) {
          message.textContent = data.message || "Could not load orders.";
          return;
        }

        if (!Array.isArray(data) || data.length === 0) {
          message.textContent = "No orders found.";
          return;
        }

        data.forEach(order => {
          const card = document.createElement("div");
          card.className = "order-card";

          card.innerHTML = `
            <h3>Order #${order._id || order.id || "N/A"}</h3>
            <p><span class="label">Customer:</span> ${order.customerName || order.name || "Unknown"}</p>
            <p><span class="label">Items:</span> ${
              Array.isArray(order.items)
                ? order.items.join(", ")
                : "No items listed"
            }</p>
            <p><span class="label">Total:</span> $${order.total ?? "0.00"}</p>
            <div class="status">${order.status || "Pending"}</div>
          `;

          ordersContainer.appendChild(card);
        });
      } catch (error) {
        message.textContent = "Could not connect to the server.";
      }
    }

    loadOrdersBtn.addEventListener("click", loadOrders);
  </script>
</body>
</html>
