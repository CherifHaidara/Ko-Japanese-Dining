<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Ko Japanese Dining - Admin Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
      padding: 30px;
    }

    h1 {
      margin-bottom: 10px;
    }

    h2 {
      margin-bottom: 30px;
      font-weight: normal;
      color: #ccc;
    }

    .orders-container {
      display: grid;
      gap: 20px;
    }

    .order-card {
      background: #1d1d1d;
      border: 1px solid #333;
      border-radius: 10px;
      padding: 20px;
    }

    .order-card h3 {
      margin-top: 0;
      color: #ffb3b8;
    }

    .label {
      font-weight: bold;
      color: #ddd;
    }

    .status {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 5px;
      background: #e63946;
      margin-top: 10px;
    }

    #message {
      margin-bottom: 20px;
      color: #ffb3b8;
    }

    button {
      padding: 10px 16px;
      background: #e63946;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      margin-bottom: 20px;
    }

    button:hover {
      background: #ff4d5a;
    }
  </style>
</head>
<body>
  <h1>Ko Japanese Dining</h1>
  <h2>Admin Dashboard</h2>

  <button id="loadOrdersBtn">Load Orders</button>
  <div id="message"></div>
  <div id="ordersContainer" class="orders-container"></div>

  <script>
    const loadOrdersBtn = document.getElementById("loadOrdersBtn");
    const ordersContainer = document.getElementById("ordersContainer");
    const message = document.getElementById("message");
  
    async function loadOrders() {
      message.textContent = "";
      ordersContainer.innerHTML = "";
  
      const token = localStorage.getItem("token");
  
      try {
        const res = await fetch("http://localhost:5050/api/admin/orders", {
          headers: {
            "Content-Type": "application/json",
            ...(token ? { Authorization: `Bearer ${token}` } : {})
          }
        });
  
        const data = await res.json();
  
        if (!res.ok) {
          message.textContent = data.message || "Could not load orders.";
          return;
        }
  
        if (!Array.isArray(data) || data.length === 0) {
          message.textContent = "No orders found.";
          return;
        }
  
        data.forEach(order => {
          const card = document.createElement("div");
          card.className = "order-card";
  
          const itemsText = Array.isArray(order.items)
            ? order.items.map(i => i.name || i).join(", ")
            : "No items";
  
          card.innerHTML = `
            <h3>Order #${order.id}</h3>
            <p><span class="label">Customer:</span> ${order.customerName}</p>
            <p><span class="label">Items:</span> ${itemsText}</p>
            <p><span class="label">Total:</span> $${order.total}</p>
  
            <div class="status">${order.status}</div>
  
            <select id="status-${order.id}">
              <option ${order.status==="Pending"?"selected":""}>Pending</option>
              <option ${order.status==="Preparing"?"selected":""}>Preparing</option>
              <option ${order.status==="Ready"?"selected":""}>Ready</option>
              <option ${order.status==="Completed"?"selected":""}>Completed</option>
            </select>
  
            <br>
            <button onclick="updateStatus(${order.id})">Update Status</button>
            <button onclick='viewDetails(${JSON.stringify(order)})'>Details</button>
          `;
  
          ordersContainer.appendChild(card);
        });
  
      } catch (error) {
        message.textContent = "Could not connect to the server.";
      }
    }
  
    async function updateStatus(id) {
      const token = localStorage.getItem("token");
      const status = document.getElementById(`status-${id}`).value;
  
      try {
        const res = await fetch(`http://localhost:5050/api/admin/orders/${id}/status`, {
          method: "PATCH",
          headers: {
            "Content-Type": "application/json",
            Authorization: `Bearer ${token}`
          },
          body: JSON.stringify({ status })
        });
  
        const data = await res.json();
  
        if (!res.ok) {
          message.textContent = data.message || "Update failed.";
          return;
        }
  
        message.style.color = "lightgreen";
        message.textContent = "Status updated";
  
        loadOrders();
  
      } catch {
        message.textContent = "Server error.";
      }
    }
  
    function viewDetails(order) {
      alert(JSON.stringify(order, null, 2));
    }
  
    loadOrdersBtn.addEventListener("click", loadOrders);
  
    // 🔥 real-time refresh
    setInterval(loadOrders, 5000);
  </script>
</body>
</html>
