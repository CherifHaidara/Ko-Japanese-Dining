<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Ko Japanese Dining - Sign Up</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    /* Navbar */
        nav {
            background: black;
            padding: 5px 0px;
            border-bottom: 1px solid #ccc;
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
            transition: transform 0.3s ease;

        }

        #navbar.hide {
            transform: translateY(-100%);
        }

        .nav-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 60px;
        }

        /* Logo */
        .logo {
            color: white;
            font-size: 22px;
            font-weight: bold;
        }

        /* Nav links */
        .nav-links {
            list-style: none;
            display: flex;
            gap: 25px;
        }

        .nav-links li {
            position: relative;
        }

        .nav-links a {
            text-decoration: none;
            color: white;
            font-size: 16px;
            padding: 10px;
            display: block;
        }

        .nav-links a:hover {
            background: #a82929;
            border-radius: 5px;
        }

        /* Dropdown */
        .dropdown-menu {
            display: none;
            position: absolute;
            top: 40px;
            left: 0;
            background: white;
            list-style: none;
            min-width: 150px;
            border-radius: 5px;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.2);
        }

        .dropdown-menu li a {
            color: #333;
            padding: 10px;
        }

        .dropdown-menu li a:hover {
            background: #f2f2f2;
        }

        /* Show dropdown */
        .show {
            display: block;
        }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)),
                  url('https://images.unsplash.com/photo-1553621042-f6e147245754');
      background-size: cover;
      background-position: center;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
    }

    .box {
      background: rgba(0,0,0,0.85);
      padding: 40px;
      border-radius: 10px;
      width: 340px;
      text-align: center;
    }

    h1 {
      margin-bottom: 10px;
    }

    h3 {
      margin-bottom: 20px;
      font-weight: normal;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 5px;
      border: none;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #e63946;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      margin-top: 10px;
      font-size: 16px;
    }

    button:hover {
      background: #ff4d5a;
    }

    p {
      margin-top: 15px;
      font-size: 14px;
      color: #ddd;
    }

    a {
      color: #ffb3b8;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    #message {
      margin-top: 12px;
      font-size: 14px;
      min-height: 18px;
    }
  </style>
</head>
<body>
  <nav>
        <div class="nav-container">

            <div class="logo"><a href="home-page.html"><img src="../images/FillerSabaiLogo.PNG" alt="Ko Japanese Dining"></a>
            </div>

            <ul class="nav-links">
                <li class="dropdown">

                    <a href="#" id="restaurantBtn">Restaurants and Bar ▾</a>

                    <ul class="dropdown-menu" id="restaurantMenu">
                        <li><a href="https://kojapanesedining.com">Japanese</a></li>
                        <li><a href="https://sabaithai-laodining.com">Thai</a></li>
                        <li><a href="#Bar">Bar</a></li>
                    </ul>

                </li>
                <li><a href="contact-page.html">Contact</a></li>

                <li><a href="login.html">Login</a></li>
            </ul>

        </div>
    </nav>
    
  <div class="box">
    <h1>Ko Japanese Dining</h1>
    <h3>Create Your Account</h3>

    <form id="signupForm">
      <input type="text" id="name" placeholder="Full Name" required>
      <input type="email" id="email" placeholder="Email" required>
      <input type="password" id="password" placeholder="Password" required>
      <input type="password" id="confirmPassword" placeholder="Confirm Password" required>
      <button type="submit">Sign Up</button>
    </form>

    <div id="message"></div>

    <p>Already have an account? <a href="login.html">Log in</a></p>
  </div>

  <script>
    const signupForm = document.getElementById("signupForm");
    const message = document.getElementById("message");

    signupForm.addEventListener("submit", async function (e) {
      e.preventDefault();

      const name = document.getElementById("name").value.trim();
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;
      const confirmPassword = document.getElementById("confirmPassword").value;

      message.textContent = "";
      message.style.color = "#ffb3b8";

      if (password !== confirmPassword) {
        message.textContent = "Passwords do not match.";
        return;
      }

      try {
        const response = await fetch("http://localhost:5000/api/auth/signup", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            name: name,
            email: email,
            password: password
          })
        });

        const data = await response.json();

        if (!response.ok) {
          message.textContent = data.message || "Signup failed.";
          return;
        }

        message.style.color = "#90ee90";
        message.textContent = data.message || "Account created successfully.";

        setTimeout(() => {
          window.location.href = "login.html";
        }, 1500);

      } catch (error) {
        message.style.color = "#ffb3b8";
        message.textContent = "Could not connect to the server.";
      }
    });


    //Navigation bar script
    let lastScrollTop = 0;
    const navbar = document.getElementById("navbar");

    window.addEventListener("scroll", function () {
        let scrollTop = window.pageYOffset || document.documentElement.scrollTop;

        if (scrollTop > lastScrollTop) {
            // Scrolling DOWN → hide navbar
            navbar.classList.add("hide");
        } else {
            // Scrolling UP → show navbar
            navbar.classList.remove("hide");
        }

        lastScrollTop = scrollTop <= 0 ? 0 : scrollTop;
    });
    const btn = document.getElementById("restaurantBtn");
    const menu = document.getElementById("restaurantMenu");

    btn.addEventListener("click", function (e) {
        e.preventDefault();
        menu.classList.toggle("show");
    });

  </script>
</body>
</html>
