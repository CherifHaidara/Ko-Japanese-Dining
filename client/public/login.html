<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Ko Japanese Dining - Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)),
                  url('https://images.unsplash.com/photo-1553621042-f6e147245754');
      background-size: cover;
      background-position: center;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
    }

    .box {
      background: rgba(0,0,0,0.85);
      padding: 40px;
      border-radius: 10px;
      width: 340px;
      text-align: center;
    }

    h1 {
      margin-bottom: 10px;
    }

    h3 {
      margin-bottom: 20px;
      font-weight: normal;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 5px;
      border: none;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #e63946;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      margin-top: 10px;
      font-size: 16px;
    }

    button:hover {
      background: #ff4d5a;
    }

    p {
      margin-top: 15px;
      font-size: 14px;
      color: #ddd;
    }

    a {
      color: #ffb3b8;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    #message {
      margin-top: 12px;
      font-size: 14px;
      min-height: 18px;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>Ko Japanese Dining</h1>
    <h3>Login</h3>

    <form id="loginForm">
      <input type="email" id="email" placeholder="Email" required>
      <input type="password" id="password" placeholder="Password" required>
      <button type="submit">Login</button>
    </form>

    <div id="message"></div>

    <p>Need an account? <a href="signup.html">Sign up</a></p>
  </div>

  <script>
    const loginForm = document.getElementById("loginForm");
    const message = document.getElementById("message");

    loginForm.addEventListener("submit", async function (e) {
      e.preventDefault();

      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;

      message.textContent = "";
      message.style.color = "#ffb3b8";

      try {
        const response = await fetch("http://localhost:5001/api/auth/login", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ email, password })
        });

        const data = await response.json();

        if (!response.ok) {
          message.textContent = data.message || "Login failed.";
          return;
        }

        if (data.token) {
          localStorage.setItem("token", data.token);
        }

        if (data.user) {
          localStorage.setItem("user", JSON.stringify(data.user));
        }

        message.style.color = "#90ee90";
        message.textContent = data.message || "Login successful.";

        setTimeout(() => {
          if (data.user && data.user.role === "admin") {
            window.location.href = "admin.html";
          } else {
            window.location.href = "/";
          }
        }, 1200);

      } catch (error) {
        message.textContent = "Could not connect to the server.";
      }
    });
  </script>
</body>
</html>
